* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  background: #000000;
  color: #ffffff;
  font-family: 'Inter', system-ui, sans-serif;
  overflow: hidden;
}

.page {
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 48px 32px;
  position: relative;
  text-align: center;
}

/* Top wordmark */
.wordmark {
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  font-size: 13px;
  letter-spacing: 0.3em;
  color: #fff;
  text-transform: uppercase;
}

/* Center content */
.center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
  position: relative;
  text-align: center;
}

.vmark {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -42%);
  width: 220px;
  opacity: 0.08;
  pointer-events: none;
  z-index: 0;
}

.center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
  position: relative;
  text-align: center;
  width: 100%;
}

.headline {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: clamp(36px, 9vw, 52px);
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -0.01em;
  color: #ffffff;
  position: relative;
  z-index: 1;
  text-align: center;
  width: 100%;
}

.subtext {
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.55);
  position: relative;
  z-index: 1;
  text-align: center;
  width: 100%;
}

.btn {
  margin-top: 8px;
  display: inline-block;
  padding: 14px 40px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 4px;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.2em;
  color: #fff;
  text-decoration: none;
  text-transform: uppercase;
  background: transparent;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
  z-index: 1;
}

.btn:hover {
  border-color: rgba(255,255,255,0.6);
  background: rgba(255,255,255,0.04);
}

/* Status states */
.status {
  font-size: 11px;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.3);
  position: relative;
  z-index: 1;
  min-height: 16px;
}

.status.error { color: rgba(239, 68, 68, 0.7); }
.status.success { color: rgba(255,255,255,0.4); }

/* Bottom domain */
.domain {
  font-size: 11px;
  letter-spacing: 0.25em;
  color: rgba(255,255,255,0.2);
  text-transform: uppercase;
}

/* Loading pulse */
@keyframes pulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.7; }
}
.loading { animation: pulse 1.5s ease-in-out infinite; }

/* Fade in */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.center { animation: fadeUp 0.8s ease forwards; }

  </div>

  <script>
    const status = document.getElementById("status");
    const cta = document.getElementById("cta");

    async function confirmEmail() {
      const params = new URLSearchParams(window.location.search);
      const hashParams = new URLSearchParams(window.location.hash.replace("#", "?").slice(1));

      const token = params.get("token") || hashParams.get("access_token");
      const type = params.get("type") || hashParams.get("type");
      const errorDesc = params.get("error_description") || hashParams.get("error_description");

      // Handle error from Supabase
      if (errorDesc) {
        status.textContent = errorDesc;
        status.className = "status error";
        cta.style.display = "inline-block";
        return;
      }

      // If no token — user landed here directly
      if (!token) {
        status.textContent = "Account ready. Sign in to begin.";
        status.className = "status success";
        cta.style.display = "inline-block";
        return;
      }

      // Token present — confirmation flow
      try {
        status.textContent = "Confirming your account...";
        status.className = "status loading";

        // Small delay for feel
        await new Promise(r => setTimeout(r, 1200));

        status.textContent = "Confirmed.";
        status.className = "status success";
        cta.style.display = "inline-block";

        // Auto-redirect after 3s
        setTimeout(() => {
          window.location.href = "https://vionyx-xi.vercel.app";
        }, 3000);

      } catch (e) {
        status.textContent = "Something went wrong. Try signing in directly.";
        status.className = "status error";
        cta.style.display = "inline-block";
      }
    }

    confirmEmail();
  </script>
