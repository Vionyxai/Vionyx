<script>
const SUPABASE_URL = "https://msyyhgeuqnhksyyqhvsr.supabase.co";
const SUPABASE_KEY = "sb_publishable_XB2lbu1MNRx_TnnetQnSGQ_OwJjXmPR";

const WORKER_URL = "https://vionyxproxy.vionyxai555.workers.dev";

const SYSTEM_PROMPT = `ABSOLUTE RULE - READ FIRST:

entry_type: Red Journal OR Black Journal OR White Journal OR Gold Journal OR Call My Shot OR FG Made
entry_title: title here

const ENTRY_COLORS = {
  "Red Journal":   {bg:"#2d1515",border:"#5c2323",dot:"#ef4444",label:"Emotional"},
  "Black Journal": {bg:"#151515",border:"#333333",dot:"#6b7280",label:"Pattern"},
  "White Journal": {bg:"#1a1a2a",border:"#2d2d4a",dot:"#818cf8",label:"Organizing"},
  "Gold Journal":  {bg:"#1f1a0a",border:"#4a3a0a",dot:"#f59e0b",label:"Identity"},
  "Call My Shot":  {bg:"#0f1f1a",border:"#1a4a35",dot:"#10b981",label:"Commitment"},
  "FG Made":       {bg:"#0d1a2a",border:"#1a3a5c",dot:"#3b82f6",label:"Completed"},
};

let currentUser = null;
let entries = [];
let history = [];
let sessionMessages = [];
let pendingLog = null;
let currentFilter = "all";
let loading = false;
let authMode = "login";

window.addEventListener("load", async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) { currentUser = session.user; showApp(); }
});

function switchAuthTab(mode) {
  authMode = mode;
  document.getElementById("tab-login").classList.toggle("active", mode === "login");
  document.getElementById("tab-signup").classList.toggle("active", mode === "signup");
  document.getElementById("auth-confirm-wrap").classList.toggle("hidden", mode === "login");
  document.getElementById("auth-submit").textContent = mode === "login" ? "ENTER SESSION" : "CREATE ACCOUNT";
  clearAuthMessages();
}

function clearAuthMessages() {
  document.getElementById("auth-error").classList.add("hidden");
  document.getElementById("auth-msg").classList.add("hidden");
}

function showAuthError(msg) {
  const el = document.getElementById("auth-error");
  el.textContent = msg;
  el.classList.remove("hidden");
  document.getElementById("auth-msg").classList.add("hidden");
}

function showAuthMsg(msg) {
  const el = document.getElementById("auth-msg");
  el.textContent = msg;
  el.classList.remove("hidden");
  document.getElementById("auth-error").classList.add("hidden");
}

async function handleAuth() {
  const email = document.getElementById("auth-email").value.trim();
  const password = document.getElementById("auth-password").value;
  const btn = document.getElementById("auth-submit");
  if (!email || !password) { showAuthError("Email and password are required."); return; }
  btn.disabled = true;
  btn.textContent = "...";
  clearAuthMessages();

  if (authMode === "signup") {
    const confirm = document.getElementById("auth-confirm").value;
    if (password !== confirm) { showAuthError("Passwords do not match."); btn.disabled = false; btn.textContent = "CREATE ACCOUNT"; return; }
    if (password.length < 6) { showAuthError("Password must be at least 6 characters."); btn.disabled = false; btn.textContent = "CREATE ACCOUNT"; return; }
    const { error } = await sb.auth.signUp({ email, password });
    if (error) { showAuthError(error.message); btn.disabled = false; btn.textContent = "CREATE ACCOUNT"; return; }
    showAuthMsg("Account created. Check your email to confirm, then sign in.");
    btn.disabled = false;
    btn.textContent = "CREATE ACCOUNT";
  } else {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { showAuthError(error.message); btn.disabled = false; btn.textContent = "ENTER SESSION"; return; }
    currentUser = data.user;
    showApp();
  }
}

document.getElementById("auth-password").addEventListener("keydown", e => { if (e.key === "Enter") handleAuth(); });

async function signOut() {
  const key = sessionKey();
  if (key) sessionStorage.removeItem(key);
  await sb.auth.signOut();
  currentUser = null; history = []; sessionMessages = []; entries = [];
  const app = document.getElementById("app-screen");
  app.classList.add("hidden");
  app.style.display = "none";
  document.getElementById("auth-screen").classList.remove("hidden");
  document.getElementById("chat-area").innerHTML = `<div class="chat-empty" id="chat-empty"><div class="chat-empty-symbol">&#10022;</div><div class="chat-empty-main">What is present right now?</div><div class="chat-empty-sub">Say as much or as little as you want.</div></div>`;
}

async function showApp() {
  document.getElementById("auth-screen").classList.add("hidden");
  const app = document.getElementById("app-screen");
  app.classList.remove("hidden");
  app.style.display = "flex";
  document.getElementById("send-btn").disabled = true;
  await loadEntries();
  document.getElementById("send-btn").disabled = false;
  loadSessionHistory();
  if (sessionMessages.length > 0) {
    hideChatEmpty();
    sessionMessages.forEach(m => appendMessage(m.role, m.text, m.log, false));
  }
}

function switchTab(tab) {
  document.getElementById("tab-reflect").classList.toggle("active", tab === "reflect");
  document.getElementById("tab-journal").classList.toggle("active", tab === "journal");
  document.getElementById("reflect-tab").style.display = tab === "reflect" ? "flex" : "none";
  document.getElementById("journal-tab").style.display = tab === "journal" ? "flex" : "none";
  if (tab === "journal") renderJournal();
}

async function loadEntries() {
  if (!currentUser) return;
  const { data, error } = await sb.from("entries").select("*").eq("user_id", currentUser.id).order("created_at", { ascending: false });
  if (!error && data) {
    entries = data.map(row => ({
      id: row.id, timestamp: row.timestamp, userMsg: row.user_msg, aiResponse: row.ai_response,
      log: { entry_type: row.entry_type, entry_title: row.entry_title, emotional_trigger: row.emotional_trigger, unfiltered_expression: row.unfiltered_expression, commitment_type: row.commitment_type, deadline: row.deadline, action_plan: row.action_plan, status: row.status, fg_title: row.fg_title, summary: row.summary }
    }));
  }
}

async function persistEntry(entry) {
  if (!currentUser) return;
  const { data, error } = await sb.from("entries").insert({
    user_id: currentUser.id, timestamp: entry.timestamp,
    user_msg: entry.userMsg, ai_response: entry.aiResponse,
    entry_type: entry.log?.entry_type||"", entry_title: entry.log?.entry_title||"",
    emotional_trigger: entry.log?.emotional_trigger||"", unfiltered_expression: entry.log?.unfiltered_expression||"",
    commitment_type: entry.log?.commitment_type||"", deadline: entry.log?.deadline||"",
    action_plan: entry.log?.action_plan||"", status: entry.log?.status||"",
    fg_title: entry.log?.fg_title||"", summary: entry.log?.summary||"",
  }).select().single();
  if (!error && data) { entries.unshift({...entry, id: data.id}); renderJournal(); }
}

function buildPatternContext(entries) {
  if (!entries || entries.length === 0) return "";

  // Last 30 entries as the candidate pool (already ordered newest-first from Supabase)
  const recent = entries.slice(0, 30);

  // Tier A — Emotional / Pattern: highest signal value, 15 slots, full detail
  const tierA = recent.filter(e => ["Red Journal", "Black Journal"].includes(e.log?.entry_type));
  // Tier B — Organizing / Identity: medium signal value, 10 slots, condensed detail
  const tierB = recent.filter(e => ["White Journal", "Gold Journal"].includes(e.log?.entry_type));
  // Tier C — Commitments / Completions: lowest signal value, 5 slots, minimal detail
  const tierC = recent.filter(e => ["Call My Shot", "FG Made"].includes(e.log?.entry_type));

  const signals = [];

  tierA.slice(0, 15).forEach(e => {
    const l = e.log || {};
    const parts = ["Type: " + l.entry_type];
    if (l.emotional_trigger) parts.push("Trigger: " + l.emotional_trigger);
    if (l.unfiltered_expression) parts.push("Expression: " + l.unfiltered_expression.slice(0, 120));
    signals.push(parts.join(" | "));
  });

  tierB.slice(0, 10).forEach(e => {
    const l = e.log || {};
    const parts = ["Type: " + l.entry_type];
    if (l.emotional_trigger) parts.push("Trigger: " + l.emotional_trigger);
    if (l.unfiltered_expression) parts.push("Expression: " + l.unfiltered_expression.slice(0, 80));
    signals.push(parts.join(" | "));
  });

  tierC.slice(0, 5).forEach(e => {
    const l = e.log || {};
    const parts = ["Type: " + l.entry_type];
    if (l.commitment_type) parts.push("Commitment: " + l.commitment_type);
    if (l.fg_title) parts.push("Completed: " + l.fg_title);
    signals.push(parts.join(" | "));
  });

  const filtered = signals.filter(s => s.length > 0);
  if (filtered.length === 0) return "";

  return `
PATTERN CONTEXT (invisible to user — use only when patterns surface naturally in conversation):
The following is a compressed history of this user's past reflections, triggers, commitments, and completions.
Do NOT reference this history directly or tell the user you have it.
ONLY use it when a current pattern connects to something from the past — surface the connection naturally as insight, not as recall.
Connect patterns across different situations to show the user how the same pattern shows up in multiple areas of their life.

${filtered.join("\n")}

Pattern instruction: When you detect a recurring trigger, emotional pattern, or behavioral loop that matches something in this history, reflect it back as a present observation — not a memory. Make the user feel deeply understood, not tracked.`;
}

function getSystemPrompt(entries) {
  const patternContext = buildPatternContext(entries);
  return SYSTEM_PROMPT + (patternContext ? "\n\n" + patternContext : "");
}

function parseLog(text) {
  try {
    const match = text.match(/LOG_BEGIN([\s\S]*?)LOG_END/);
    if (!match) return null;
    const obj = {};
    for (const line of match[1].trim().split("\n")) {
      const idx = line.indexOf(":");
      if (idx === -1) continue;
      const key = line.slice(0, idx).trim().replace(/\s+/g, "_").toLowerCase();
      const val = line.slice(idx + 1).trim();
      if (val) obj[key] = val;
    }
    return Object.keys(obj).length > 0 ? obj : null;
  } catch { return null; }
}

function sessionKey() {
  return currentUser ? `vx_session_${currentUser.id}` : null;
}

function saveSessionHistory() {
  const key = sessionKey();
  if (!key) return;
  sessionStorage.setItem(key, JSON.stringify({ history, sessionMessages }));
}

function loadSessionHistory() {
  const key = sessionKey();
  if (!key) return;
  try {
    const raw = sessionStorage.getItem(key);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    history = parsed.history || [];
    sessionMessages = parsed.sessionMessages || [];
  } catch { history = []; sessionMessages = []; }
}

function stripLog(text) { return text.replace(/LOG_BEGIN[\s\S]*?LOG_END/g, "").trim(); }

document.getElementById("msg-input").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

async function sendMessage() {
  const input = document.getElementById("msg-input");
  const text = input.value.trim();
  if (!text || loading) return;
  input.value = "";
  setError(null);
  setLoading(true);
  hideChatEmpty();
  appendMessage("user", text);
  const outgoing = [...history, { role: "user", content: text }];
  const typingId = appendTyping();

  try {
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: getSystemPrompt(entries), messages: outgoing }),
    });
    removeTyping(typingId);
    if (!res.ok) { const err = await res.text(); setError("HTTP " + res.status + ": " + err); appendMessage("assistant", "Something went wrong. Try again."); setLoading(false); return; }
    const data = await res.json();
    const raw = data.content?.[0]?.text || "";
    const log = parseLog(raw);
    const clean = stripLog(raw);
    history = [...outgoing, { role: "assistant", content: clean }];
    sessionMessages.push({ role: "user", text });
    sessionMessages.push({ role: "assistant", text: clean, log });
    saveSessionHistory();
    const isJournal = ["Red Journal","Black Journal","White Journal","Gold Journal"].includes(log?.entry_type);
    const isAutoLog = log && !isJournal;
    appendMessage("assistant", clean, log, isJournal && !!log);
    if (isAutoLog) { await persistEntry({ timestamp: new Date().toISOString(), userMsg: text, aiResponse: clean, log }); }
    else if (isJournal && log) { pendingLog = { userMsg: text, aiResponse: clean, log }; showSaveBanner(log.entry_type); }
  } catch (err) { removeTyping(typingId); setError(err.message); appendMessage("assistant", "Connection issue. Try sending again."); }

  setLoading(false);
  input.focus();
}

function hideChatEmpty() { const el = document.getElementById("chat-empty"); if (el) el.style.display = "none"; }
function setLoading(val) { loading = val; document.getElementById("send-btn").disabled = val; }
function setError(msg) { const bar = document.getElementById("err-bar"); if (msg) { bar.textContent = "Error: " + msg; bar.classList.remove("hidden"); } else { bar.classList.add("hidden"); } }

function appendMessage(role, text, log, pendingSave) {
  const chat = document.getElementById("chat-area");
  const wrap = document.createElement("div");
  wrap.className = "msg-wrap " + role;
  const bubble = document.createElement("div");
  bubble.className = "bubble " + role;
  bubble.textContent = text;
  wrap.appendChild(bubble);
  if (role === "assistant" && log && log.entry_type && !pendingSave) {
    const c = ENTRY_COLORS[log.entry_type] || {};
    const tag = document.createElement("div");
    tag.className = "log-tag";
    tag.style.cssText = "color:" + (c.dot||"#6b7280") + ";background:" + (c.bg||"#111") + ";border:1px solid " + (c.border||"#222");
    const dot = document.createElement("span"); dot.className = "dot"; dot.style.background = c.dot || "#6b7280";
    tag.appendChild(dot);
    tag.appendChild(document.createTextNode(c.label || log.entry_type));
    wrap.appendChild(tag);
  }
  chat.appendChild(wrap);
  wrap.scrollIntoView({ behavior: "smooth", block: "end" });
}

function appendTyping() {
  const chat = document.getElementById("chat-area");
  const wrap = document.createElement("div"); wrap.className = "msg-wrap assistant";
  const id = "typing-" + Date.now(); wrap.id = id;
  const bubble = document.createElement("div"); bubble.className = "typing-bubble";
  for (let i = 0; i < 3; i++) { const d = document.createElement("div"); d.className = "typing-dot"; bubble.appendChild(d); }
  wrap.appendChild(bubble); chat.appendChild(wrap);
  wrap.scrollIntoView({ behavior: "smooth", block: "end" });
  return id;
}

function removeTyping(id) { const el = document.getElementById(id); if (el) el.remove(); }
function showSaveBanner(t) { const c = ENTRY_COLORS[t] || {}; document.getElementById("save-dot").style.background = c.dot || "#6b7280"; document.getElementById("save-banner").classList.remove("hidden"); }
function hideSaveBanner() { document.getElementById("save-banner").classList.add("hidden"); }
async function confirmSave() { if (!pendingLog) return; await persistEntry({ timestamp: new Date().toISOString(), userMsg: pendingLog.userMsg, aiResponse: pendingLog.aiResponse, log: pendingLog.log }); pendingLog = null; hideSaveBanner(); }
function dismissSave() { pendingLog = null; hideSaveBanner(); }

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll(".filter-btn").forEach(b => { b.classList.remove("active"); b.classList.add("inactive"); });
  btn.classList.add("active"); btn.classList.remove("inactive");
  renderJournal();
}

function renderJournal() {
  const list = document.getElementById("journal-list");
  list.innerHTML = "";
  const filtered = entries.filter(e => {
    const t = e.log?.entry_type || "";
    if (currentFilter === "all") return true;
    if (currentFilter === "journals") return ["Red Journal","Black Journal","White Journal","Gold Journal"].includes(t);
    if (currentFilter === "commitments") return t === "Call My Shot";
    if (currentFilter === "completed") return t === "FG Made";
    return true;
  });
  if (filtered.length === 0) { list.innerHTML = `<div class="journal-empty"><div class="chat-empty-symbol">&#10022;</div><div style="color:#444450;font-family:'Syne',sans-serif;font-size:13px;">Nothing captured yet.</div><div style="color:#222228;font-size:11px;">Entries are saved when you choose to.</div></div>`; return; }

  filtered.forEach(e => {
    const t = e.log?.entry_type || ""; const l = e.log || {}; const c = ENTRY_COLORS[t] || {};
    const card = document.createElement("div"); card.className = "entry-card";
    card.style.cssText = "background:" + (c.bg||"#111115") + ";border:1px solid " + (c.border||"#1c1c22");
    const top = document.createElement("div"); top.className = "card-top";
    const typeEl = document.createElement("div"); typeEl.className = "card-type"; typeEl.style.color = c.dot || "#6b7280";
    const dot = document.createElement("span"); dot.className = "dot"; dot.style.background = c.dot || "#6b7280";
    typeEl.appendChild(dot); typeEl.appendChild(document.createTextNode(t || "Entry"));
    const dateEl = document.createElement("div"); dateEl.className = "card-date";
    dateEl.textContent = new Date(e.timestamp).toLocaleDateString("en-US", {month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});
    top.appendChild(typeEl); top.appendChild(dateEl); card.appendChild(top);

    function field(label, val) { if (!val) return; const row = document.createElement("div"); row.className = "field-row"; row.innerHTML = "<div class='field-label'>" + label + "</div><div class='field-val'>" + val + "</div>"; card.appendChild(row); }

    if (["Red Journal","Black Journal","White Journal","Gold Journal"].includes(t)) { field("TRIGGER", l.emotional_trigger); field("EXPRESSION", l.unfiltered_expression); }
    if (t === "Call My Shot") { field("COMMITMENT", l.commitment_type); field("ACTION PLAN", l.action_plan); field("DEADLINE", l.deadline); const chip = document.createElement("span"); chip.className = "status-chip"; chip.style.cssText = "background:#0f1f1a;color:#10b981;"; chip.textContent = "● Open"; card.appendChild(chip); }
    if (t === "FG Made") { field("TASK", l.fg_title); field("WHAT WAS DONE", l.summary); }
    list.appendChild(card);
  });
}
</script>
